    <title>Lab 1</title>

    <style>
        body {
            margin: 0;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: #0f0f0f;
            font-family: Arial, sans-serif;
        }

        .container {
            text-align: center;
            background: #1a1a1a;
            padding: 50px;
            border-radius: 20px;
            box-shadow: 0 0 40px rgba(255, 0, 0, 0.788);
            border: 1px solid rgba(119, 43, 43, 0.08);
        }

        h1 {
            color: #ffffff;
            margin-bottom: 40px;
            font-size: 32px;
            letter-spacing: 2px;
        }

        a {
            display: block;
            margin: 15px 0;
            padding: 14px 40px;
            text-decoration: none;
            background: #030101;
            color: #fff;
            font-size: 18px;
            border-radius: 12px;
            border: 1px solid rgba(255,255,255,0.1);
            transition: 0.3s ease;
        }

        a:hover {
            background: #c40c0c;
            box-shadow: 0 0 15px rgba(255,255,255,0.3);
            transform: translateY(-3px);
        }
    </style>
</head>
